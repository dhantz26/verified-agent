name: Verify Human Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: 'dhantz26'
        required: true
        default: 'finder'
      agent_description:
        description: 'dhantz26'
        required: true
        default: 'dhantz26 AI Agent'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install ClawHub
        run: npx clawhub@latest install verified-agent-identity

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Create Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Link Human
        run: |
          node scripts/manualLinkHumanToAgent.js --challenge '{"name": "dhantz26", "description": "dhantz26 AI Agent"}'
